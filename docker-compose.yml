services:
  db:
    image: postgres:16-alpine
    container_name: maxbot-db
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: botdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d botdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maxbot-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://bot:bot@db:5432/botdb
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
